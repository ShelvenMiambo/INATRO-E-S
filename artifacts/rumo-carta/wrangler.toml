name = "rumo-carta"
pages_build_output_dir = "dist/public"
compatibility_date = "2025-06-01"

# Depois de correr `npm run cf:d1:create`, copia o database_id devolvido
# para aqui. Sem isto, o binding "DB" não funciona em produção (o dev
# local com `wrangler pages dev --d1 DB=rumocarta-db` funciona sem
# database_id, usando uma D1 local em .wrangler/state).
[[d1_databases]]
binding = "DB"
database_name = "rumocarta-db"
database_id = "PREENCHER_APOS_CF_D1_CREATE"
